name: mobile unit tests

# Runs the pure-logic unit tests (answer grader, etc.). Scoped to mobile/ so it only
# fires when app code changes — not on clue-pack / drafter PRs.
on:
  pull_request:
    paths:
      - 'mobile/**'
  push:
    branches: [main]
    paths:
      - 'mobile/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm test
