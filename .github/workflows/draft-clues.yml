name: Draft clues (scheduled)

# Cloud version of the local "TriviaTrainer-DraftClues" Windows task — so both
# harvesting AND drafting run in the cloud, not on a laptop. On a daily cron it:
#   1. harvests a few fresh J! Archive games into the flat topic pool + keywords them,
#   2. drafts ~15 source-grounded clues for two under-covered categories (pulling docs
#      from the keyword pool) and opens ONE PR,
#   3. attaches the refreshed pool.json + harvest-state to that same PR — so the pool
#      accumulates via the REVIEWED merge (the bot can't push to protected main directly).
# It NEVER imports live and NEVER merges; going live happens only when a human merges the
# PR (which also lands the pool update), via the existing import-on-merge.yml workflow.
#
# RELIABILITY: GitHub scheduled runs are best-effort — under load they can be delayed
# or dropped outright, even off the top of the hour. For a once-daily job that risks a
# missed day, so we fire FOUR times across the morning and make the job idempotent: a
# cheap `guard` job checks whether today's draft branch (draft-clues/daily-<UTC date>)
# already exists and, if so, skips. Net effect: up to 4 attempts, but it drafts exactly
# once per day. (Scheduled workflows also auto-disable after 60 days of zero repo
# activity — not a risk here since merged draft PRs keep the repo active.)
#
# Required repository secret (Settings → Secrets and variables → Actions):
#   CLAUDE_CODE_OAUTH_TOKEN  – generate locally with `claude setup-token`. Uses your
#                              Claude subscription (no metered API cost).
#     Alternative: set ANTHROPIC_API_KEY instead and uncomment it below (metered API billing).
# Reuses the existing SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY secrets — the prompt reads
# active per-category counts to choose under-covered categories.
#
# Also required, one-time: Settings → Actions → General → Workflow permissions →
#   tick "Allow GitHub Actions to create and approve pull requests".

on:
  schedule:
    # Four UTC slots ~2h apart, ≈6:43 AM–12:43 PM PT (PDT). Redundancy against dropped
    # scheduled runs; the guard job makes the extra firings no-ops. All kept well before
    # 00:00 UTC so every slot shares one UTC date (the branch-name key). Fixed UTC, so
    # this drifts ~1h across US daylight-saving changes (fine for a drafter). First slot
    # pulled an hour earlier (was 14:43) to give the long draft step more daytime runway.
    - cron: '43 13 * * *'
    - cron: '43 15 * * *'
    - cron: '43 17 * * *'
    - cron: '43 19 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: "Draft even if today's draft already exists (bypass the guard)"
        type: boolean
        default: false

# Never let two drafter runs overlap; a queued slot waits, then the guard skips it.
concurrency:
  group: draft-clues
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # Cheap (~10s) idempotency check so the redundant cron slots don't double-draft.
  guard:
    runs-on: ubuntu-latest
    outputs:
      already: ${{ steps.check.outputs.already }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Forced run — guard bypassed."
            echo "already=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          today="$(date -u +%F)"
          if git ls-remote --heads origin "draft-clues/daily-$today" | grep -q .; then
            echo "Today's draft branch (draft-clues/daily-$today) already exists — skipping."
            echo "already=true" >> "$GITHUB_OUTPUT"
          else
            echo "No draft yet for $today — proceeding."
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

  draft:
    needs: guard
    if: needs.guard.outputs.already != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # alternative to the OAuth token (metered)
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GH_TOKEN: ${{ github.token }} # lets the agent open the PR with `gh`
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 # full history so the agent can branch off main cleanly

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code

      - name: Configure git identity
        run: |
          git config user.name  "trivia-drafter[bot]"
          git config user.email "trivia-drafter@users.noreply.github.com"

      - name: Preflight — required secrets present
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::Set CLAUDE_CODE_OAUTH_TOKEN (from \`claude setup-token\`) or ANTHROPIC_API_KEY." >&2
            exit 1
          fi
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY secrets are not set." >&2
            exit 1
          fi

      - name: Harvest fresh Jeopardy topics + keyword them
        run: |
          node tools/acquisition/jarchive-daily-harvest.mjs --perRun 8
          node tools/acquisition/keyword-topics.mjs
          # Set the pool/cursor aside so the drafter's own git ops run on a clean tree;
          # the next step re-applies + commits them onto the draft branch (so they ride
          # in the reviewed PR rather than a blocked direct push to protected main).
          git stash push -- data/sourcing/topics/pool.json data/sourcing/harvest-state.json || true

      # DIAGNOSTIC: the draft step has been running ~50+ min on hosted runners vs
      # ~20-30 min locally. Prime suspect is Wikipedia rate-limiting the shared Actions
      # egress IP — build-topic-docs fetches ~25 docs/category and the 429-backoff turns
      # throttling into long waits. This step times raw Wikipedia REST calls in isolation:
      # if avg latency is small and 0x429, the network is NOT the bottleneck (look at the
      # LLM turns in the --verbose draft log instead); if it's seconds-per-call or shows
      # 429s, throttling is confirmed and we can add a longer delay / mirror / caching.
      - name: Probe — Wikipedia fetch latency from this runner
        run: |
          node -e '
            const titles = ["Albert Einstein","Mount Everest","Jazz","Pablo Picasso","World War II","Photosynthesis","The Great Gatsby","Wolfgang Amadeus Mozart","Roman Empire","Pacific Ocean"];
            const urls = titles.map(t => "https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(t.replace(/ /g, "_")));
            (async () => {
              let total = 0, n429 = 0, ok = 0;
              for (const u of urls) {
                const t0 = Date.now();
                let status = "ERR";
                try {
                  const r = await fetch(u, { headers: { "User-Agent": "TriviaTrainerProbe/0.1 (personal study app)", Accept: "application/json" } });
                  status = r.status;
                  if (r.status === 429) n429++; else if (r.ok) ok++;
                } catch (e) { status = e.message; }
                const ms = Date.now() - t0;
                total += ms;
                console.log("  " + status + "  " + ms + "ms  " + decodeURIComponent(u.split("/").pop()));
              }
              console.log("\nWikipedia probe: " + urls.length + " reqs, " + ok + " ok, " + n429 + " x 429, avg " + Math.round(total / urls.length) + "ms/req.");
            })();
          '

      - name: Draft clues and open a PR (headless Claude Code)
        run: |
          # --verbose streams every assistant turn + tool result to the log so we can
          # see WHICH internal step (build-topic-docs fetches, verify-clue-sources, the
          # import dry-run, or LLM thinking) eats the wall-clock — Actions timestamps
          # each log line, so elapsed-between-tools is readable in the raw log.
          cat planning/draft-clues-prompt.md | claude -p --verbose \
            --model claude-sonnet-4-6 \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,TodoWrite" \
            --max-turns 120

      - name: Attach the refreshed pool to today's draft PR
        if: always()
        run: |
          branch="draft-clues/daily-$(date -u +%F)"
          if git rev-parse --verify --quiet "$branch" >/dev/null && git stash list | grep -q .; then
            git checkout "$branch"
            git stash pop
            git add data/sourcing/topics/pool.json data/sourcing/harvest-state.json
            git commit -m "chore(harvest): refresh topic pool + cursor for $(date -u +%F)"
            git push origin "$branch"
            echo "Pool + cursor attached to $branch (rides in the draft PR)."
          else
            echo "No draft branch or nothing stashed — harvest increment not kept this run (cursor on main is unchanged, so it re-harvests next time)."
          fi
