name: Draft clues (daily)

# Cloud version of the local "TriviaTrainer-DraftClues" Windows task — so both
# harvesting AND drafting run in the cloud, not on a laptop. Each run:
#   1. harvests a few fresh J! Archive games into the flat topic pool + keywords them
#      (committed straight onto the run's branch),
#   2. drafts ~15 source-grounded clues for two under-covered categories (pulling docs
#      from the keyword pool) and opens ONE PR — pool + clues ride in that PR.
# It NEVER imports live and NEVER merges; going live happens only when a human merges the
# PR (which also lands the pool update), via the existing import-on-merge.yml workflow.
#
# TRIGGER: fired daily by an EXTERNAL scheduler (cron-job.org) hitting this workflow's
# workflow_dispatch endpoint. GitHub's own `schedule:` cron proved too unreliable —
# it silently dropped runs — so it was removed. The `guard` job still dedups: it skips
# if today's branch (draft-clues/daily-<UTC date>) already exists, so an accidental
# double dispatch can't double-draft. FORCED dispatches (force=true) bypass the guard
# AND get a unique -r<run_id> branch suffix, so a manual re-run never collides.
#
# Required repository secret (Settings → Secrets and variables → Actions):
#   CLAUDE_CODE_OAUTH_TOKEN  – generate locally with `claude setup-token`. Uses your
#                              Claude subscription (no metered API cost).
#     Alternative: set ANTHROPIC_API_KEY instead and uncomment it below (metered API billing).
# Reuses the existing SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY secrets — the prompt reads
# active per-category counts to choose under-covered categories.
#
# Also required, one-time: Settings → Actions → General → Workflow permissions →
#   tick "Allow GitHub Actions to create and approve pull requests".

on:
  # Triggered daily by an external scheduler (cron-job.org) via the workflow_dispatch
  # REST endpoint. GitHub's `schedule:` cron was removed — it dropped runs unreliably.
  workflow_dispatch:
    inputs:
      force:
        description: "Draft even if today's draft already exists (bypass the guard)"
        type: boolean
        default: false

# Never let two drafter runs overlap; a queued slot waits, then the guard skips it.
concurrency:
  group: draft-clues
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # Cheap (~10s) idempotency check so the redundant cron slots don't double-draft.
  guard:
    runs-on: ubuntu-latest
    outputs:
      already: ${{ steps.check.outputs.already }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Forced run — guard bypassed."
            echo "already=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          today="$(date -u +%F)"
          if git ls-remote --heads origin "draft-clues/daily-$today" | grep -q .; then
            echo "Today's draft branch (draft-clues/daily-$today) already exists — skipping."
            echo "already=true" >> "$GITHUB_OUTPUT"
          else
            echo "No draft yet for $today — proceeding."
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

  draft:
    needs: guard
    if: needs.guard.outputs.already != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # alternative to the OAuth token (metered)
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GH_TOKEN: ${{ github.token }} # lets the agent open the PR with `gh`
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 # full history so the agent can branch off main cleanly

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code

      - name: Configure git identity
        run: |
          git config user.name  "trivia-drafter[bot]"
          git config user.email "trivia-drafter@users.noreply.github.com"

      - name: Compute the draft branch name
        run: |
          # The branch name is the run's identity. SCHEDULED runs use the plain UTC
          # date so the `guard` job collapses the 4 redundant cron slots into exactly
          # ONE draft/day. FORCED (manual, force=true) runs get a unique -r<run_id>
          # suffix so a re-run never collides with an existing same-date PR. The next
          # step creates this branch (workflow-owned), so the name can't drift no matter
          # what the agent does — keeping the guard dedup + PR contents deterministic.
          date="$(date -u +%F)"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            branch="draft-clues/daily-${date}-r${{ github.run_id }}"
          else
            branch="draft-clues/daily-${date}"
          fi
          echo "DRAFT_BRANCH=$branch" >> "$GITHUB_ENV"
          echo "Draft branch for this run: $branch"

      - name: Preflight — required secrets present
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::Set CLAUDE_CODE_OAUTH_TOKEN (from \`claude setup-token\`) or ANTHROPIC_API_KEY." >&2
            exit 1
          fi
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY secrets are not set." >&2
            exit 1
          fi

      - name: Create the draft branch (workflow-owned)
        run: |
          # The WORKFLOW owns the branch so the name can't drift: branch off main here,
          # commit the harvest onto it next, and the agent just commits its packs to THIS
          # branch (no checkout/branch in the prompt). Deterministic name = working guard
          # dedup + the harvested pool always rides in the PR.
          git checkout -b "$DRAFT_BRANCH"

      - name: Harvest fresh Jeopardy topics + keyword them
        run: |
          node tools/acquisition/jarchive-daily-harvest.mjs --perRun 8
          node tools/acquisition/keyword-topics.mjs
          # Commit the refreshed pool + cursor straight onto the draft branch so they ride
          # in the reviewed PR (the bot can't push to protected main directly). No-op if
          # the harvest found nothing new.
          git add data/sourcing/topics/pool.json data/sourcing/harvest-state.json
          git commit -m "chore(harvest): refresh topic pool + cursor for $(date -u +%F)" || echo "No harvest changes to commit this run."

      # DIAGNOSTIC: the draft step has been running ~50+ min on hosted runners vs
      # ~20-30 min locally. Prime suspect is Wikipedia rate-limiting the shared Actions
      # egress IP — build-topic-docs fetches ~25 docs/category and the 429-backoff turns
      # throttling into long waits. This step times the TWO Wikipedia endpoints
      # build-topic-docs actually hits per doc, in isolation: the light rest_v1 summary
      # AND the heavier w/api.php lead-extract (the likely throttle point). For each:
      # if avg latency is small and 0x429, that endpoint is NOT the bottleneck (look at
      # the LLM turns in the --verbose draft log instead); if it's seconds-per-call or
      # shows 429s, throttling is confirmed and we add a longer delay / mirror / caching.
      - name: Probe — Wikipedia fetch latency from this runner
        run: |
          node -e '
            const titles = ["Albert Einstein","Mount Everest","Jazz","Pablo Picasso","World War II","Photosynthesis","The Great Gatsby","Wolfgang Amadeus Mozart","Roman Empire","Pacific Ocean","Leonardo da Vinci","Mitochondrion","Ludwig van Beethoven","French Revolution","Amazon River","Quantum mechanics","Hamlet","Great Wall of China","Periodic table","Vincent van Gogh"];
            const endpoints = [
              { label: "rest_v1 summary", url: (t) => "https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(t.replace(/ /g, "_")) },
              { label: "w/api.php lead-extract", url: (t) => "https://en.wikipedia.org/w/api.php?action=query&format=json&prop=extracts&exintro=1&explaintext=1&redirects=1&titles=" + encodeURIComponent(t) },
            ];
            const wait = (ms) => new Promise((r) => setTimeout(r, ms));
            (async () => {
              // Pace at 600ms — the same delay build-topic-docs uses — so a dirty result
              // here means real throttling at realistic pacing, not just a burst artifact.
              for (const ep of endpoints) {
                let total = 0, n429 = 0, ok = 0, max = 0;
                console.log("\n[" + ep.label + "]  (600ms between calls, like build-topic-docs)");
                for (const t of titles) {
                  const t0 = Date.now();
                  let status = "ERR";
                  try {
                    const r = await fetch(ep.url(t), { headers: { "User-Agent": "TriviaTrainerProbe/0.1 (personal study app)", Accept: "application/json" } });
                    status = r.status;
                    if (r.status === 429) n429++; else if (r.ok) ok++;
                  } catch (e) { status = e.message; }
                  const ms = Date.now() - t0;
                  total += ms; if (ms > max) max = ms;
                  console.log("  " + status + "  " + ms + "ms  " + t);
                  await wait(600);
                }
                console.log("  => " + titles.length + " reqs, " + ok + " ok, " + n429 + " x 429, avg " + Math.round(total / titles.length) + "ms, max " + max + "ms");
              }
            })();
          '

      - name: Draft clues and open a PR (headless Claude Code)
        run: |
          # Stream the run as NDJSON (--output-format stream-json) through
          # format-stream.mjs, which prints one timestamped line per tool call / LLM
          # turn AS IT HAPPENS. Plain --verbose buffers everything into one dump at the
          # end (we get no live timeline), so stream-json is what makes the wall-clock
          # readable — which step (build-topic-docs, verify-clue-sources, import, or LLM
          # thinking) is slow.
          #
          # RETRY on transient server-side errors only. A single Anthropic 529 (Overloaded)
          # mid-run otherwise throws away the whole ~25-50 min draft (happened 2026-06-23,
          # 24 min in, right before writing the packs). We retry the run on 529 / 5xx /
          # overloaded with backoff, but NOT on a genuine failure (a real bug should fail
          # fast). `set +e` because the default GitHub shell is `bash -eo pipefail`, which
          # would abort the step on the first failed pipeline before the loop can react.
          # tee captures the stream so we can classify the failure; PIPESTATUS[1] is
          # claude's own exit (cat=0, claude=1, tee=2, node=3) — the real success signal.
          set +e
          max_attempts=4
          log="$(mktemp)"
          attempt=1
          while :; do
            echo "::group::Draft attempt ${attempt}/${max_attempts}"
            cat planning/draft-clues-prompt.md | claude -p --verbose --output-format stream-json \
              --model claude-sonnet-4-6 \
              --allowedTools "Bash,Read,Write,Edit,Glob,Grep,TodoWrite" \
              --max-turns 120 | tee "$log" | node tools/acquisition/format-stream.mjs
            status=${PIPESTATUS[1]}
            echo "::endgroup::"

            if [ "$status" -eq 0 ]; then
              echo "Draft succeeded on attempt ${attempt}."
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ] && \
               grep -qiE '529|overloaded|api error: 5[0-9][0-9]|internal server error|service unavailable|temporarily unavailable' "$log"; then
              # Long, escalating waits: 5 / 10 / 20 min. A 529 overload can persist for a
              # while, and dropping a ~25-50 min job is the expensive outcome — so wait it out.
              backoff=$(( 300 * (1 << (attempt - 1)) ))
              echo "::warning::Draft attempt ${attempt} hit a transient API error (claude exit ${status}). Retrying in ${backoff}s…"
              sleep "${backoff}"
              attempt=$(( attempt + 1 ))
              continue
            fi

            echo "::error::Draft failed on attempt ${attempt} (claude exit ${status}) — not a retryable transient error, or retries exhausted."
            exit 1
          done
