name: Draft clues (daily)

# Cloud version of the local "TriviaTrainer-DraftClues" Windows task — so both
# harvesting AND drafting run in the cloud, not on a laptop. Each run:
#   1. harvests a few fresh J! Archive games into the flat topic pool + keywords them
#      (committed straight onto the run's branch),
#   2. TWO-PASS drafting so the LLM critic + LLM entity tagger actually run. They can't
#      run INSIDE the drafter's own headless `claude -p` session (a nested `claude -p`
#      exits 1 in CI — that's why earlier runs shipped regex tags + no critic), so each
#      LLM step is its own TOP-LEVEL step, exactly like keyword-topics:
#        (a) DRAFT pass  — author 3 packs + deterministic gates, commit, write pr-body.md
#        (b) TAG         — node tag-pack.mjs → LLM topic_entities on the draft clues
#        (c) CRITIC      — node critique-clues.mjs → advisory verdicts (clue-critique-*.json)
#        (d) REVISE pass — apply the critic's revise/drop verdicts, replace dropped clues
#        (e) TAG (again) — tag any replacement clues
#        (f) PR          — open ONE review PR from pr-body.md
#      The drafter→critic→replace loop is preserved; it's just handed across two passes
#      through the critique JSON instead of nested in one session.
# It NEVER imports live and NEVER merges; going live happens only when a human merges the
# PR (which also lands the pool update), via the existing import-on-merge.yml workflow.
#
# TRIGGER: fired daily by an EXTERNAL scheduler (cron-job.org) hitting this workflow's
# workflow_dispatch endpoint. GitHub's own `schedule:` cron proved too unreliable —
# it silently dropped runs — so it was removed. The `guard` job still dedups: it skips
# if today's branch (draft-clues/daily-<UTC date>) already exists, so an accidental
# double dispatch can't double-draft. FORCED dispatches (force=true) bypass the guard
# AND get a unique -r<run_id> branch suffix, so a manual re-run never collides.
#
# Required repository secret (Settings → Secrets and variables → Actions):
#   CLAUDE_CODE_OAUTH_TOKEN  – generate locally with `claude setup-token`. Uses your
#                              Claude subscription (no metered API cost).
#     Alternative: set ANTHROPIC_API_KEY instead and uncomment it below (metered API billing).
# Reuses the existing SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY secrets — the prompt reads
# active per-category counts to choose under-covered categories.
#
# Also required, one-time: Settings → Actions → General → Workflow permissions →
#   tick "Allow GitHub Actions to create and approve pull requests".

on:
  # Triggered daily by an external scheduler (cron-job.org) via the workflow_dispatch
  # REST endpoint. GitHub's `schedule:` cron was removed — it dropped runs unreliably.
  workflow_dispatch:
    inputs:
      force:
        description: "Draft even if today's draft already exists (bypass the guard)"
        type: boolean
        default: false

# Never let two drafter runs overlap; a queued slot waits, then the guard skips it.
concurrency:
  group: draft-clues
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # Cheap (~10s) idempotency check so the redundant cron slots don't double-draft.
  guard:
    runs-on: ubuntu-latest
    outputs:
      already: ${{ steps.check.outputs.already }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Forced run — guard bypassed."
            echo "already=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          today="$(date -u +%F)"
          if git ls-remote --heads origin "draft-clues/daily-$today" | grep -q .; then
            echo "Today's draft branch (draft-clues/daily-$today) already exists — skipping."
            echo "already=true" >> "$GITHUB_OUTPUT"
          else
            echo "No draft yet for $today — proceeding."
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

  draft:
    needs: guard
    if: needs.guard.outputs.already != 'true'
    runs-on: ubuntu-latest
    # Headroom for the 529-retry loop (up to 4 attempts of a ~25-50 min draft + 5/10/20 min
    # backoffs). At 90 min a sustained-overload retry would be killed mid-wait, defeating the
    # "don't drop the job" intent; 240 fits the full retry budget.
    timeout-minutes: 240
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # alternative to the OAuth token (metered)
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GH_TOKEN: ${{ github.token }} # lets the agent open the PR with `gh`
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 # full history so the agent can branch off main cleanly

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code

      - name: Configure git identity
        run: |
          git config user.name  "trivia-drafter[bot]"
          git config user.email "trivia-drafter@users.noreply.github.com"

      - name: Compute the draft branch name
        run: |
          # The branch name is the run's identity. SCHEDULED runs use the plain UTC
          # date so the `guard` job collapses the 4 redundant cron slots into exactly
          # ONE draft/day. FORCED (manual, force=true) runs get a unique -r<run_id>
          # suffix so a re-run never collides with an existing same-date PR. The next
          # step creates this branch (workflow-owned), so the name can't drift no matter
          # what the agent does — keeping the guard dedup + PR contents deterministic.
          date="$(date -u +%F)"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            branch="draft-clues/daily-${date}-r${{ github.run_id }}"
          else
            branch="draft-clues/daily-${date}"
          fi
          echo "DRAFT_BRANCH=$branch" >> "$GITHUB_ENV"
          echo "Draft branch for this run: $branch"

      - name: Preflight — required secrets present
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::Set CLAUDE_CODE_OAUTH_TOKEN (from \`claude setup-token\`) or ANTHROPIC_API_KEY." >&2
            exit 1
          fi
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY secrets are not set." >&2
            exit 1
          fi

      - name: Create the draft branch (workflow-owned)
        run: |
          # The WORKFLOW owns the branch so the name can't drift: branch off main here,
          # commit the harvest onto it next, and the agent just commits its packs to THIS
          # branch (no checkout/branch in the prompt). Deterministic name = working guard
          # dedup + the harvested pool always rides in the PR.
          git checkout -b "$DRAFT_BRANCH"

      - name: Harvest fresh Jeopardy topics + keyword them
        run: |
          node tools/acquisition/jarchive-daily-harvest.mjs --perRun 8
          node tools/acquisition/keyword-topics.mjs
          # Commit the refreshed pool + cursor straight onto the draft branch so they ride
          # in the reviewed PR (the bot can't push to protected main directly). No-op if
          # the harvest found nothing new.
          git add data/sourcing/topics/pool.json data/sourcing/harvest-state.json
          git commit -m "chore(harvest): refresh topic pool + cursor for $(date -u +%F)" || echo "No harvest changes to commit this run."

      # LEARN from every merged edit BEFORE drafting: re-harvest the (draft->final) rewrites from git
      # history, pull the editor's review comments, condense any NEW pairs (Sonnet, incremental), and
      # regenerate planning/clue-rewrite-lessons.md — which the draft pass then reads. Committed onto
      # the branch so the refreshed lessons + corpus + edit-rate metrics ride in the reviewed PR (the
      # bot can't push to protected main directly; the PR is the rule-abiding path). Degrades safely:
      # a failure here must not sink the draft, so it never exits non-zero.
      - name: Learn from merged edits (refresh rewrite lessons)
        run: |
          set +e
          node tools/acquisition/harvest-clue-rewrites.mjs
          node tools/acquisition/harvest-review-comments.mjs
          node tools/acquisition/condense-rewrites.mjs
          node tools/acquisition/build-rewrite-lessons.mjs
          git add planning/clue-rewrite-lessons.md \
            data/acquisition/clue-rewrites.jsonl data/acquisition/clue-comments.jsonl \
            data/acquisition/clue-rewrite-lessons.jsonl data/acquisition/drafter-metrics.jsonl \
            data/acquisition/labeled-clues.jsonl
          git commit -m "chore(learn): refresh rewrite lessons from merged edits ($(date -u +%F))" || echo "No lesson changes this run."
          exit 0

      # DIAGNOSTIC: the draft step has been running ~50+ min on hosted runners vs
      # ~20-30 min locally. Prime suspect is Wikipedia rate-limiting the shared Actions
      # egress IP — build-topic-docs fetches ~25 docs/category and the 429-backoff turns
      # throttling into long waits. This step times the TWO Wikipedia endpoints
      # build-topic-docs actually hits per doc, in isolation: the light rest_v1 summary
      # AND the heavier w/api.php lead-extract (the likely throttle point). For each:
      # if avg latency is small and 0x429, that endpoint is NOT the bottleneck (look at
      # the LLM turns in the --verbose draft log instead); if it's seconds-per-call or
      # shows 429s, throttling is confirmed and we add a longer delay / mirror / caching.
      - name: Probe — Wikipedia fetch latency from this runner
        run: |
          node -e '
            const titles = ["Albert Einstein","Mount Everest","Jazz","Pablo Picasso","World War II","Photosynthesis","The Great Gatsby","Wolfgang Amadeus Mozart","Roman Empire","Pacific Ocean","Leonardo da Vinci","Mitochondrion","Ludwig van Beethoven","French Revolution","Amazon River","Quantum mechanics","Hamlet","Great Wall of China","Periodic table","Vincent van Gogh"];
            const endpoints = [
              { label: "rest_v1 summary", url: (t) => "https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(t.replace(/ /g, "_")) },
              { label: "w/api.php lead-extract", url: (t) => "https://en.wikipedia.org/w/api.php?action=query&format=json&prop=extracts&exintro=1&explaintext=1&redirects=1&titles=" + encodeURIComponent(t) },
            ];
            const wait = (ms) => new Promise((r) => setTimeout(r, ms));
            (async () => {
              // Pace at 600ms — the same delay build-topic-docs uses — so a dirty result
              // here means real throttling at realistic pacing, not just a burst artifact.
              for (const ep of endpoints) {
                let total = 0, n429 = 0, ok = 0, max = 0;
                console.log("\n[" + ep.label + "]  (600ms between calls, like build-topic-docs)");
                for (const t of titles) {
                  const t0 = Date.now();
                  let status = "ERR";
                  try {
                    const r = await fetch(ep.url(t), { headers: { "User-Agent": "TriviaTrainerProbe/0.1 (personal study app)", Accept: "application/json" } });
                    status = r.status;
                    if (r.status === 429) n429++; else if (r.ok) ok++;
                  } catch (e) { status = e.message; }
                  const ms = Date.now() - t0;
                  total += ms; if (ms > max) max = ms;
                  console.log("  " + status + "  " + ms + "ms  " + t);
                  await wait(600);
                }
                console.log("  => " + titles.length + " reqs, " + ok + " ok, " + n429 + " x 429, avg " + Math.round(total / titles.length) + "ms, max " + max + "ms");
              }
            })();
          '

      # (a) DRAFT pass. Authors the three packs, runs the deterministic gates, commits +
      # pushes the packs, and writes data/acquisition/pr-{title.txt,body.md} for the PR
      # step. Does NOT tag, critique, or open a PR — those are the top-level steps below.
      # Streaming + 529-retry live in the shared run-claude-pass.sh helper (both passes
      # use it), so a transient overload doesn't throw away a ~25-50 min pass.
      - name: Draft pass — author packs + deterministic gates
        run: bash tools/acquisition/run-claude-pass.sh planning/draft-clues-prompt.md claude-sonnet-4-6

      # Today's packs by date: sourced are "<cat>-draft-<date>.json", wordplay is
      # "wordplay-<date>.json" — both end in "-<date>.json", so this glob catches exactly
      # this run's three packs (older packs carry other dates). Reused by every step below.
      - name: Tag draft clues with LLM topic entities
        run: |
          packs=$(ls data/sourcing/packs/drafts/*-"$(date -u +%F)".json)
          echo "Tagging: $packs"
          node tools/acquisition/tag-pack.mjs $packs
          # Deterministically fix wordplay answer casing (crossword UPPER, others Title Case) so the
          # LLM-constructed wordplay doesn't need hand-fixing — see normalize-wordplay-casing.mjs.
          node tools/acquisition/normalize-wordplay-casing.mjs $packs
          git add $packs
          git commit -m "chore(clues): LLM topic_entities + wordplay casing for $(date -u +%F) draft" \
            && git push origin HEAD || echo "No tag changes to commit."

      # Advisory critic. Runs on the now-tagged packs so its RELATED-clue check uses the
      # LLM tags. Writes data/acquisition/clue-critique-batch.json (+ .md) for the revise
      # pass to consume. Never hard-fails (it exits 0 and degrades) — guard anyway.
      - name: Editorial critic (advisory; feeds the revise pass)
        run: |
          packs=$(ls data/sourcing/packs/drafts/*-"$(date -u +%F)".json)
          args=""; for p in $packs; do args="$args --pack $p"; done
          # `timeout` bounds the critic: it shells out to the `claude` CLI, which can hang
          # indefinitely (network / model stall). The critic is ADVISORY, so a hang must
          # degrade like any other failure instead of stalling the job to its 240-min cap —
          # `timeout` kills it (exit 124) and the `|| echo` catches it, same as a crash.
          timeout 900 node tools/acquisition/critique-clues.mjs $args || echo "Critic degraded or timed out (advisory) — continuing."

      # (d) REVISE pass. Reads the critique JSON and applies every revise/drop verdict —
      # replacing dropped clues so each pack keeps its count — re-runs the affected gates,
      # updates pr-body.md with the critic outcome, and commits. Replacement clues are left
      # UNtagged so the next step tags them. Does NOT tag or open a PR.
      - name: Revise pass — apply critic feedback + replace drops
        run: bash tools/acquisition/run-claude-pass.sh planning/revise-clues-prompt.md claude-sonnet-4-6

      # Tag any fresh replacement clues the revise pass authored (tag-pack skips clues that
      # already carry topic_entities, so this only touches new ones). No-op if nothing changed.
      - name: Tag any replacement clues
        run: |
          packs=$(ls data/sourcing/packs/drafts/*-"$(date -u +%F)".json)
          node tools/acquisition/tag-pack.mjs $packs
          node tools/acquisition/normalize-wordplay-casing.mjs $packs
          git add $packs
          git commit -m "chore(clues): LLM topic_entities + wordplay casing for revised clues" \
            && git push origin HEAD || echo "No new tags to commit."

      # (e2) Flag answers that ALSO appear in other open draft PRs. The bank-collision gate only
      # sees ACTIVE clues, so an answer sitting in an unmerged sibling PR is invisible until it
      # merges — then the second PR's clue is skipped at import (the #99/#107 "Ice" case). This
      # appends an overlap warning to the PR body so the human de-dups before merging. Advisory.
      - name: Flag answer overlaps with open draft PRs
        run: |
          packs=$(ls data/sourcing/packs/drafts/*-"$(date -u +%F)".json)
          node tools/acquisition/check-open-pr-answer-overlaps.mjs $packs --append data/acquisition/pr-body.md \
            || echo "Overlap check degraded (advisory) — continuing."

      # (f) Open the ONE review PR. The workflow owns PR creation (not the agent) because
      # tagging now happens after the revise pass; the agent supplied the title/body files.
      - name: Open the review PR
        run: |
          title_file="data/acquisition/pr-title.txt"
          body_file="data/acquisition/pr-body.md"
          if [ ! -f "$title_file" ] || [ ! -f "$body_file" ]; then
            echo "::error::pr-title.txt / pr-body.md missing — the draft pass did not write them." >&2
            exit 1
          fi
          git push origin HEAD  # ensure the branch is on origin (no-op if already pushed)
          gh pr create --base main --head "$DRAFT_BRANCH" \
            --title "$(cat "$title_file")" --body-file "$body_file"
