name: Draft clues (scheduled)

# Cloud version of the local "TriviaTrainer-DraftClues" Windows task — so drafting
# no longer depends on a laptop being awake. On a daily cron it runs Claude Code
# headless to draft ~15 source-grounded clues for an under-covered category, verify
# + dry-run-gate them, and open a PR for review. It NEVER imports live and NEVER
# merges (the prompt's hard rules enforce that); going live still happens only when
# a human merges the PR, via the existing import-on-merge.yml workflow.
#
# Required repository secret (Settings → Secrets and variables → Actions):
#   CLAUDE_CODE_OAUTH_TOKEN  – generate locally with `claude setup-token`. Uses your
#                              Claude subscription (no metered API cost).
#     Alternative: set ANTHROPIC_API_KEY instead and uncomment it below (metered API billing).
# Reuses the existing SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY secrets — the prompt reads
# active per-category counts to choose an under-covered category.
#
# Also required, one-time: Settings → Actions → General → Workflow permissions →
#   tick "Allow GitHub Actions to create and approve pull requests".

on:
  schedule:
    # 14:43 UTC ≈ 7:43 AM PT (PDT). Deliberately off the top of the hour — :00 cron
    # slots are heavily contended on GitHub and can be dropped. GitHub cron is fixed
    # UTC, so this drifts ~1h across US daylight-saving changes (fine for a drafter).
    - cron: '43 14 * * *'
  workflow_dispatch: {} # manual "Run workflow" button — replaces the local Start-ScheduledTask kick

concurrency:
  group: draft-clues
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # alternative to the OAuth token (metered)
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GH_TOKEN: ${{ github.token }} # lets the agent open the PR with `gh`
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 # full history so the agent can branch off main cleanly

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code

      - name: Configure git identity
        run: |
          git config user.name  "trivia-drafter[bot]"
          git config user.email "trivia-drafter@users.noreply.github.com"

      - name: Preflight — required secrets present
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::Set CLAUDE_CODE_OAUTH_TOKEN (from \`claude setup-token\`) or ANTHROPIC_API_KEY." >&2
            exit 1
          fi
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY secrets are not set." >&2
            exit 1
          fi

      - name: Draft clues and open a PR (headless Claude Code)
        run: |
          cat planning/draft-clues-prompt.md | claude -p \
            --model claude-sonnet-4-6 \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,TodoWrite" \
            --max-turns 120
