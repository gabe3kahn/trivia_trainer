<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="TriviO app icon">
  <!-- Full-bleed square, NO transparency, NO pre-rounded corners (iOS masks them). -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1A1B2B"/>
      <stop offset="100%" stop-color="#0B0B14"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- The "O" as a gold target: outer ring + center dot -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="#F2B84B" stroke-width="96"/>
  <circle cx="512" cy="512" r="78" fill="#F2B84B"/>
</svg>
